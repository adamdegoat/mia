<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0B0A0D;--text:#F3EEE7;--muted:#9A939C;--muted-2:#837D88;--ember:#FF6A2B;--ember-2:#FF8A4A}
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{background:radial-gradient(1000px 520px at 50% -18%,#211a20,#0B0A0D 62%);
    font-family:"Space Grotesk",system-ui,sans-serif;color:var(--text);position:relative}
  .grain{position:absolute;inset:0;opacity:.05;mix-blend-mode:overlay;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}
  .wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:56px 70px}
  .onair{display:flex;align-items:center;gap:11px;font-family:"Space Mono",monospace;font-size:16px;
    letter-spacing:.32em;text-transform:uppercase;color:var(--ember);margin-bottom:30px}
  .onair .d{width:11px;height:11px;border-radius:50%;background:var(--ember);box-shadow:0 0 16px 2px rgba(255,106,43,.6)}
  canvas{display:block;width:980px;height:150px;
    -webkit-mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);
    mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent)}
  .mark{font-size:132px;font-weight:700;letter-spacing:-.01em;line-height:1;margin-top:14px}
  .mark b{color:var(--ember);font-weight:700}
  .tag{font-size:30px;font-weight:500;color:var(--text);letter-spacing:-.01em;margin-top:24px;text-align:center;max-width:20ch;line-height:1.32}
  .foot{position:absolute;left:0;right:0;bottom:40px;text-align:center;font-family:"Space Mono",monospace;
    font-size:16px;letter-spacing:.14em;color:var(--muted-2)}
  .foot b{color:var(--muted);font-weight:400}
</style>
</head>
<body>
<div class="grain"></div>
<div class="wrap">
  <div class="onair"><span class="d"></span>Live voice demo</div>
  <canvas id="w" width="1960" height="300"></canvas>
  <div class="mark">M<b>i</b>a</div>
  <div class="tag">Your 24/7 front desk. She answers every client, and never misses a lead.</div>
</div>
<div class="foot"><b>Tap and talk to her out loud</b> &nbsp;·&nbsp; adamdegoat.github.io/mia</div>
<script>
// static voiceprint, same language as the live app
const cv=document.getElementById('w'), c=cv.getContext('2d'), W=cv.width, H=cv.height, BARS=72, mid=H/2, gap=W/BARS;
const seed=[3,7,2,9,4,6,8,3,5,9,4,7,2,6,8,5,3,9,6,4,7,9,5,8,3,6,9,7,4,8,6,9,5,7,9,8,6,9,7,5,8,6,9,4,7,9,6,8,5,7,3,9,6,4,8,5,7,2,6,9,4,7,3,8,5,6,9,4,7,2,5,3];
for(let i=0;i<BARS;i++){
  const x=i*gap+gap/2, cb=1-Math.abs(i-(BARS-1)/2)/((BARS-1)/2);
  const amp=(0.28+0.72*cb)*(0.45+0.55*(seed[i%seed.length]/9));
  const h=Math.max(6,amp*mid*1.7), bw=Math.max(5,gap*0.32), r=Math.min(bw/2,h);
  c.fillStyle='rgba(255,106,43,'+(0.5+0.5*cb)+')';
  c.beginPath();
  if(c.roundRect) c.roundRect(x-bw/2, mid-h, bw, h*2, r); else c.rect(x-bw/2, mid-h, bw, h*2);
  c.fill();
}
</script>
</body>
</html>
